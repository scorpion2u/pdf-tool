<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>多功能PDF工具</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      max-width: 860px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.08);
      padding: 2rem 1.8rem;
    }
    h1 { font-size: 2rem; font-weight: 600; color: #1a2639; margin-bottom: 0.3rem; }
    .subtitle { color: #5b677b; margin-bottom: 1.5rem; font-size: 0.9rem; border-left: 4px solid #3b82f6; padding-left: 1rem; }

    /* 🔧 优化后的工具栏 */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }
    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 0.8rem 0.5rem;
      border-radius: 1.2rem;
      border: 2px solid transparent;
      background: #f8fafc;
      color: #475569;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      text-align: center;
    }
    .tool-btn .tool-icon {
      font-size: 1.4rem;
      line-height: 1;
    }
    .tool-btn .tool-label {
      font-size: 0.75rem;
      line-height: 1;
    }
    .tool-btn:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }
    .tool-btn.active {
      background: #1e293b;
      color: white;
      border-color: #1e293b;
      box-shadow: 0 4px 12px rgba(30,41,59,0.25);
    }
    .tool-btn.active:hover { background: #1e293b; }

    .card { background: #f9fafc; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #eef2f6; }
    .file-area {
      border: 2px dashed #cbd5e1;
      border-radius: 1.2rem;
      padding: 2rem 1rem;
      text-align: center;
      background: #fff;
      transition: 0.2s;
      margin-bottom: 1rem;
      cursor: pointer;
    }
    .file-area:hover { border-color: #3b82f6; background: #f8faff; }
    .file-area.dragover { border-color: #2563eb; background: #eef4ff; }
    .file-input { display: none; }
    .icon { font-size: 2rem; margin-bottom: 0.3rem; }
    .file-label { font-weight: 500; color: #1e293b; }
    .file-hint { color: #64748b; font-size: 0.75rem; margin-top: 0.2rem; }

    .file-list-item {
      display: flex;
      align-items: center;
      background: white;
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      margin: 0.4rem 0;
      border: 1px solid #e9eef3;
      font-size: 0.85rem;
      gap: 0.5rem;
      min-width: 0;
    }
    .drag-handle { cursor: grab; color: #94a3b8; font-size: 1.1rem; padding: 0 0.2rem; user-select: none; flex-shrink: 0; }
    .file-info { display: flex; align-items: center; gap: 0.4rem; flex: 1; min-width: 0; overflow: hidden; }
    .file-idx { background: #e2e8f0; color: #475569; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
    .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .file-size { font-size: 0.7rem; color: #64748b; white-space: nowrap; flex-shrink: 0; }
    .badge { display: inline-flex; align-items: center; gap: 0.2rem; padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; white-space: nowrap; flex-shrink: 0; }
    .badge-encrypted { background: #fef3c7; color: #92400e; }
    .badge-ok { background: #d1fae5; color: #065f46; }
    .badge-error { background: #fee2e2; color: #b91c1c; }
    .badge-plain { background: #e0e7ff; color: #3730a3; }
    .file-actions { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .pwd-input { width: 100px; padding: 0.35rem 0.5rem; border-radius: 1.5rem; border: 1px solid #fbbf24; font-size: 0.75rem; background: #fffbeb; flex-shrink: 0; }
    .pwd-input.error { border-color: #ef4444 !important; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0.2rem; border-radius: 0.5rem; flex-shrink: 0; }
    .btn-icon:hover { background: #fee2e2; }
    .btn-retry { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.65rem; cursor: pointer; flex-shrink: 0; }

    .btn-group { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1rem; }
    .btn-primary { background: #1e293b; border: none; color: white; padding: 0.6rem 1.5rem; border-radius: 2rem; font-weight: 500; cursor: pointer; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.3rem; transition: 0.2s; }
    .btn-primary:hover { background: #111827; }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-secondary { background: white; border: 1px solid #d1d5db; color: #1f2937; padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 500; cursor: pointer; font-size: 0.85rem; }

    .password-section { margin-top: 0.8rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; background: #fef3c7; padding: 0.7rem 1rem; border-radius: 1rem; border: 1px solid #fbbf24; }
    .password-input { padding: 0.5rem 0.8rem; border-radius: 2rem; border: 1px solid #d1d5db; flex: 1; min-width: 120px; }
    .toggle-pwd { background: none; border: none; cursor: pointer; font-size: 0.85rem; color: #3b82f6; }
    .info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 1rem; padding: 0.7rem 1rem; margin-top: 0.8rem; font-size: 0.8rem; color: #1e40af; line-height: 1.5; }
    .highlight-box { background: #fefce8; border: 2px solid #facc15; border-radius: 1rem; padding: 0.8rem; margin-top: 0.8rem; font-size: 0.8rem; display: flex; gap: 0.6rem; align-items: flex-start; }
    .progress-bar-wrap { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; margin-top: 0.8rem; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #3b82f6; border-radius: 4px; transition: width 0.3s; width: 0%; }
    .status { margin-top: 0.8rem; font-size: 0.85rem; padding: 0.5rem 1rem; border-radius: 2rem; display: inline-block; }
    .status-info { color: #2563eb; background: #eef4ff; }
    .status-warn { color: #b45309; background: #fffbeb; }
    .status-success { color: #059669; background: #ecfdf5; }
    .same-pwd-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.6rem; font-size: 0.8rem; }
    .same-pwd-row input[type="checkbox"] { accent-color: #3b82f6; }
    .quality-selector { display: flex; align-items: center; gap: 0.8rem; margin-top: 0.8rem; flex-wrap: wrap; background: #f8fafc; padding: 0.6rem 1rem; border-radius: 1rem; font-size: 0.8rem; }
    .quality-selector label { font-weight: 500; white-space: nowrap; }
    .quality-selector select { padding: 0.4rem 0.8rem; border-radius: 2rem; border: 1px solid #d1d5db; font-size: 0.8rem; }
    select { padding: 0.5rem; border-radius: 2rem; border: 1px solid #ccc; font-size: 0.85rem; }
    .output-format-row { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; margin-top: 0.8rem; }
    .output-format-row label { font-weight: 500; font-size: 0.85rem; }

    @media (max-width: 600px) {
      .container { padding: 1.2rem 0.8rem; }
      .tools-grid { grid-template-columns: repeat(4, 1fr); gap: 0.4rem; }
      .tool-btn { padding: 0.6rem 0.3rem; }
      .tool-btn .tool-icon { font-size: 1.2rem; }
      .tool-btn .tool-label { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📄 PDF工具箱</h1>
  <div class="subtitle">8合1多功能PDF处理工具</div>

  <div class="tools-grid" id="toolsGrid">
    <button class="tool-btn active" data-tool="removePassword">
      <span class="tool-icon">🔓</span>
      <span class="tool-label">删除密码</span>
    </button>
    <button class="tool-btn" data-tool="split">
      <span class="tool-icon">✂️</span>
      <span class="tool-label">拆分PDF</span>
    </button>
    <button class="tool-btn" data-tool="merge">
      <span class="tool-icon">🔗</span>
      <span class="tool-label">合并PDF</span>
    </button>
    <button class="tool-btn" data-tool="compress">
      <span class="tool-icon">📦</span>
      <span class="tool-label">压缩PDF</span>
    </button>
    <button class="tool-btn" data-tool="extract">
      <span class="tool-icon">🖼️</span>
      <span class="tool-label">提取图片</span>
    </button>
    <button class="tool-btn" data-tool="extractPages">
      <span class="tool-icon">📑</span>
      <span class="tool-label">提取页面</span>
    </button>
    <button class="tool-btn" data-tool="pdfToImages">
      <span class="tool-icon">🔄</span>
      <span class="tool-label">PDF转图片</span>
    </button>
    <button class="tool-btn" data-tool="imagesToPdf">
      <span class="tool-icon">📸</span>
      <span class="tool-label">图片转PDF</span>
    </button>
  </div>

  <div class="card" id="toolCard"></div>
  <div id="statusArea" style="text-align: center;"></div>
</div>

<script>
(function() {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  let currentTool = 'removePassword';
  let fileEntries = [];

  const toolCard = document.getElementById('toolCard');
  const statusArea = document.getElementById('statusArea');
  const toolsGrid = document.getElementById('toolsGrid');
  const multiFileTools = ['merge', 'removePassword', 'imagesToPdf'];

  toolsGrid.addEventListener('click', (e) => {
    const btn = e.target.closest('.tool-btn');
    if (!btn) return;
    toolsGrid.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
    fileEntries = [];
    clearStatus();
    renderToolUI();
  });

  function clearStatus() { statusArea.innerHTML = ''; }
  function setStatus(text, type = 'info') {
    const cls = type === 'warn' ? 'status-warn' : type === 'success' ? 'status-success' : 'status-info';
    statusArea.innerHTML = `<div class="status ${cls}">${text}</div>`;
  }
  function setProgress(pct, text = '') {
    statusArea.innerHTML = `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div style="text-align:center;font-size:0.75rem;color:#64748b;">${text || Math.round(pct) + '%'}</div>`;
  }

  function getRenderOptions() {
    if (currentTool === 'compress') return { scale: parseFloat(document.getElementById('renderScale')?.value || '1.0'), quality: parseFloat(document.getElementById('jpegQuality')?.value || '0.6') };
    if (currentTool === 'pdfToImages') return { scale: parseFloat(document.getElementById('renderScale')?.value || '2.0'), quality: parseFloat(document.getElementById('jpegQuality')?.value || '0.92') };
    return { scale: 2.0, quality: 0.92 };
  }

  async function renderPdfToImages(file, password = '', options = {}) {
    const { scale = 2.0, quality = 0.92 } = options;
    const arrayBuf = await file.arrayBuffer();
    const loadingTask = pdfjsLib.getDocument({ data: arrayBuf, password: password || undefined });
    return new Promise((resolve, reject) => {
      loadingTask.onPassword = (_, reason) => { if (reason === 1) reject(new Error('NEED_PASSWORD')); else if (reason === 2) reject(new Error('INCORRECT_PASSWORD')); };
      loadingTask.promise.then(async (pdf) => {
        const pages = [];
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const vp = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.width = vp.width; canvas.height = vp.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
          const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
          pages.push({ width: vp.width, height: vp.height, data: await blob.arrayBuffer(), blob });
        }
        resolve(pages);
      }).catch(err => { if (err.name === 'PasswordException') reject(new Error('INCORRECT_PASSWORD')); else reject(err); });
    });
  }

  async function createPdfFromImages(pageImages) {
    const { PDFDocument } = PDFLib;
    const doc = await PDFDocument.create();
    for (const img of pageImages) {
      let jpg;
      if (img.data instanceof ArrayBuffer) jpg = await doc.embedJpg(img.data);
      else if (img.blob) jpg = await doc.embedJpg(await img.blob.arrayBuffer());
      const page = doc.addPage([img.width, img.height]);
      page.drawImage(jpg, { x: 0, y: 0, width: img.width, height: img.height });
    }
    return await doc.save();
  }

  async function checkEncrypted(file) {
    try { await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise; return false; }
    catch (e) { return !!(e.name === 'PasswordException' || (e.message && e.message.includes('password'))); }
  }

  async function processPdf(file, password = '') {
    const needsPwd = await checkEncrypted(file);
    if (needsPwd && !password) throw new Error('NEED_PASSWORD');
    return { pageImages: await renderPdfToImages(file, password, getRenderOptions()), isEncrypted: needsPwd };
  }

  async function extractImages(file, password = '') {
    const arrayBuf = await file.arrayBuffer();
    const loadingTask = pdfjsLib.getDocument({ data: arrayBuf, password: password || undefined });
    return new Promise((resolve, reject) => {
      loadingTask.onPassword = (_, reason) => { if (reason === 1) reject(new Error('NEED_PASSWORD')); else if (reason === 2) reject(new Error('INCORRECT_PASSWORD')); };
      loadingTask.promise.then(async (pdf) => {
        const images = [];
        for (let p = 1; p <= pdf.numPages; p++) {
          const page = await pdf.getPage(p);
          const ops = await page.getOperatorList();
          for (let i = 0; i < ops.fnArray.length; i++) {
            if (ops.fnArray[i] === pdfjsLib.OPS.paintImageXObject || ops.fnArray[i] === pdfjsLib.OPS.paintInlineImageXObject) {
              try {
                const imgData = await page.objs.get(ops.argsArray[i][0]);
                if (imgData?.data) {
                  const canvas = document.createElement('canvas');
                  canvas.width = imgData.width; canvas.height = imgData.height;
                  const ctx = canvas.getContext('2d');
                  const id = ctx.createImageData(imgData.width, imgData.height);
                  id.data.set(imgData.data); ctx.putImageData(id, 0, 0);
                  const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                  images.push({ blob, pageNum: p, index: images.length + 1 });
                }
              } catch (e) {}
            }
          }
        }
        resolve(images);
      }).catch(err => { if (err.name === 'PasswordException') reject(new Error('INCORRECT_PASSWORD')); else reject(err); });
    });
  }

  function handleError(err, idx) {
    const entry = fileEntries[idx];
    if (!entry) return;
    if (err.message === 'NEED_PASSWORD') { entry.status = 'error'; setStatus(`⚠️ 需要密码`, 'warn'); }
    else if (err.message === 'INCORRECT_PASSWORD') { entry.status = 'error'; setStatus(`❌ 密码错误`, 'warn'); }
    else { setStatus(`❌ ${err.message}`, 'warn'); }
    renderFileList();
  }

  function renderToolUI() {
    clearStatus();
    const builders = { merge: buildMergeUI, split: buildSplitUI, removePassword: buildRemovePwdUI, compress: buildCompressUI, extract: buildExtractUI, extractPages: buildExtractPagesUI, pdfToImages: buildPdfToImagesUI, imagesToPdf: buildImagesToPdfUI };
    toolCard.innerHTML = (builders[currentTool] || (() => ''))();
    attachEvents();
    renderFileList();
  }

  function fileDropArea(multiple, icon, title, accept = '.pdf') {
    return `<div class="file-area" id="fileArea"><div class="icon">${icon}</div><div class="file-label">${title}</div><div class="file-hint">${multiple ? '支持多选，可拖拽排序' : '选择一个文件'} (${accept})</div><input type="file" id="fileAreaInput" class="file-input" accept="${accept}" ${multiple ? 'multiple' : ''}></div><div id="fileAreaList" class="file-list"></div>`;
  }

  function buildMergeUI() {
    return `${fileDropArea(true, '📎', '选择要合并的PDF')}<div class="same-pwd-row" id="samePwdRow" style="display:none;"><input type="checkbox" id="samePwdCheck" checked><label for="samePwdCheck">所有加密PDF使用相同密码</label></div><div id="globalPwdSection" class="password-section" style="display:none;"><span>🔑 统一密码：</span><input type="password" id="globalPassword" class="password-input" placeholder="输入密码"><button class="toggle-pwd" data-target="globalPassword">👁️</button></div><div class="btn-group"><button class="btn-primary" id="actionBtn">🔗 开始合并</button><button class="btn-secondary" id="clearBtn">清空列表</button></div>`;
  }
  function buildSplitUI() {
    return `${fileDropArea(false, '✂️', '选择一个PDF用于拆分')}<div id="globalPwdSection" class="password-section" style="display:none;"><span>🔑 密码：</span><input type="password" id="globalPassword" class="password-input" placeholder="输入PDF密码"><button class="toggle-pwd" data-target="globalPassword">👁️</button></div><div style="margin-top:0.8rem;display:flex;gap:0.6rem;align-items:center;"><label>拆分方式：</label><select id="splitMode"><option value="pages">按页拆分</option><option value="range">自定义范围</option></select></div><div id="rangeInputWrap" style="margin-top:0.6rem;display:none;"><input type="text" id="rangeInput" placeholder="如: 1-3,5" style="width:100%;padding:0.5rem;border-radius:2rem;border:1px solid #ddd;"></div><div class="btn-group"><button class="btn-primary" id="actionBtn">✂️ 执行拆分</button></div>`;
  }
  function buildRemovePwdUI() {
    return `${fileDropArea(true, '🔓', '选择要删除密码的PDF')}<div class="same-pwd-row" id="samePwdRow" style="display:none;"><input type="checkbox" id="samePwdCheck" checked><label for="samePwdCheck">所有加密PDF使用相同密码</label></div><div id="globalPwdSection" class="password-section" style="display:none;"><span>🔑 统一密码：</span><input type="password" id="globalPassword" class="password-input" placeholder="输入密码"><button class="toggle-pwd" data-target="globalPassword">👁️</button></div><div class="highlight-box"><span>🔓</span><div>导出无密码保护的PDF。</div></div><div class="btn-group"><button class="btn-primary btn-danger" id="actionBtn">🔓 删除密码并导出</button><button class="btn-secondary" id="clearBtn">清空列表</button></div>`;
  }
  function buildCompressUI() {
    return `${fileDropArea(false, '📦', '选择要压缩的PDF')}<div id="globalPwdSection" class="password-section" style="display:none;"><span>🔑 密码：</span><input type="password" id="globalPassword" class="password-input" placeholder="输入PDF密码"><button class="toggle-pwd" data-target="globalPassword">👁️</button></div><div class="quality-selector"><label>🔍 清晰度：</label><select id="renderScale"><option value="1.0" selected>标清</option><option value="1.5">高清</option><option value="2.0">超清</option></select><label>📦 质量：</label><select id="jpegQuality"><option value="0.5">最大压缩</option><option value="0.6" selected>节省空间</option><option value="0.75">平衡</option><option value="0.85">高质量</option></select></div><div class="btn-group"><button class="btn-primary" id="actionBtn">📦 压缩PDF</button></div>`;
  }
  function buildExtractUI() {
    return `${fileDropArea(false, '🖼️', '选择PDF提取图片')}<div id="globalPwdSection" class="password-section" style="display:none;"><span>🔑 密码：</span><input type="password" id="globalPassword" class="password-input" placeholder="输入PDF密码"><button class="toggle-pwd" data-target="globalPassword">👁️</button></div><div class="btn-group"><button class="btn-primary" id="actionBtn">🖼️ 提取图片</button></div>`;
  }
  function buildExtractPagesUI() {
    return `${fileDropArea(false, '📑', '选择一个PDF提取页面')}<div id="globalPwdSection" class="password-section" style="display:none;"><span>🔑 密码：</span><input type="password" id="globalPassword" class="password-input" placeholder="输入PDF密码"><button class="toggle-pwd" data-target="globalPassword">👁️</button></div><div style="margin-top:0.8rem;"><label style="font-weight:500;">提取范围：</label><input type="text" id="extractRange" placeholder="如: 1-3,5,7-9" style="width:100%;padding:0.5rem;border-radius:2rem;border:1px solid #ddd;margin-top:0.4rem;"></div><div class="info-box">💡 输入页码范围，如 <strong>1-3,5</strong> 提取第1-3页和第5页。</div><div class="btn-group"><button class="btn-primary" id="actionBtn">📑 提取页面</button></div>`;
  }
  function buildPdfToImagesUI() {
    return `${fileDropArea(false, '🔄', '选择一个PDF转为图片')}<div id="globalPwdSection" class="password-section" style="display:none;"><span>🔑 密码：</span><input type="password" id="globalPassword" class="password-input" placeholder="输入PDF密码"><button class="toggle-pwd" data-target="globalPassword">👁️</button></div><div class="quality-selector"><label>🔍 清晰度：</label><select id="renderScale"><option value="1.5">高清</option><option value="2.0" selected>超清</option><option value="3.0">极致</option></select><label>📦 质量：</label><select id="jpegQuality"><option value="0.85">高质量</option><option value="0.92" selected>最佳</option><option value="1.0">无损</option></select></div><div class="output-format-row"><label>输出格式：</label><select id="outputFormat"><option value="jpeg">JPEG</option><option value="png">PNG</option></select><label style="margin-left:0.8rem;">打包下载：</label><input type="checkbox" id="zipDownload"></div><div class="btn-group"><button class="btn-primary" id="actionBtn">🔄 转为图片</button></div>`;
  }
  function buildImagesToPdfUI() {
    return `${fileDropArea(true, '📸', '选择图片合成PDF', '.jpg,.jpeg,.png,.webp,.bmp')}<div style="margin-top:0.8rem;display:flex;gap:0.8rem;align-items:center;flex-wrap:wrap;"><label>页面尺寸：</label><select id="pageSize"><option value="auto" selected>自动</option><option value="a4">A4</option><option value="letter">Letter</option></select><label>缩放：</label><select id="fitMode"><option value="fit" selected>适应</option><option value="fill">填充</option><option value="original">原始</option></select></div><div class="info-box">💡 支持JPG/PNG/WebP/BMP，可拖拽排序。</div><div class="btn-group"><button class="btn-primary" id="actionBtn">📸 合成为PDF</button><button class="btn-secondary" id="clearBtn">清空列表</button></div>`;
  }

  async function renderFileList() {
    const listDiv = document.getElementById('fileAreaList');
    if (!listDiv) return;
    if (!fileEntries.length) { listDiv.innerHTML = ''; updatePasswordUI(); return; }

    if (currentTool !== 'imagesToPdf') {
      for (const e of fileEntries) { if (e.encrypted === undefined) e.encrypted = await checkEncrypted(e.file); }
    }
    updatePasswordUI();
    const useSame = isSamePasswordMode();

    listDiv.innerHTML = fileEntries.map((entry, idx) => {
      const isImg = currentTool === 'imagesToPdf';
      const sBadge = entry.status === 'ok' ? '<span class="badge badge-ok">✅</span>' : entry.status === 'error' ? '<span class="badge badge-error">❌</span>' : '';
      const eBadge = !isImg ? (entry.encrypted ? '<span class="badge badge-encrypted">🔒</span>' : '<span class="badge badge-plain">📄</span>') : '';
      let pwdHtml = '';
      if (!isImg && entry.encrypted && !useSame) {
        pwdHtml = `<input type="password" class="pwd-input ${entry.status==='error'?'error':''}" value="${escapeHtml(entry.password||'')}" data-idx="${idx}" placeholder="密码">`;
        if (entry.status === 'error') pwdHtml += `<button class="btn-retry" data-idx="${idx}">🔄</button>`;
      } else if (!isImg && entry.encrypted && entry.status === 'error' && useSame) {
        pwdHtml = `<button class="btn-retry" data-idx="${idx}">🔄</button>`;
      }
      return `<div class="file-list-item" draggable="true" data-idx="${idx}"><span class="drag-handle">⠿</span><div class="file-info"><span class="file-idx">${idx+1}</span><span class="file-name">${isImg ? '🖼️' : '📄'} ${escapeHtml(entry.file.name)}</span><span class="file-size">(${(entry.file.size/1024).toFixed(0)}KB)</span>${eBadge}${sBadge}</div><div class="file-actions">${pwdHtml}<button class="btn-icon remove-btn" data-idx="${idx}">✕</button></div></div>`;
    }).join('');
    bindListEvents();
  }

  function bindListEvents() {
    const list = document.getElementById('fileAreaList');
    if (!list) return;
    list.querySelectorAll('.remove-btn').forEach(b => b.onclick = (e) => { e.stopPropagation(); fileEntries.splice(parseInt(b.dataset.idx), 1); renderFileList(); });
    list.querySelectorAll('.pwd-input').forEach(i => i.oninput = function() { const idx = parseInt(this.dataset.idx); fileEntries[idx].password = this.value; if (fileEntries[idx].status === 'error') { fileEntries[idx].status = undefined; renderFileList(); } });
    list.querySelectorAll('.btn-retry').forEach(b => b.onclick = () => { const idx = parseInt(b.dataset.idx); fileEntries[idx].status = undefined; renderFileList(); executeAction(idx); });
    setupDragSort(list);
  }

  function setupDragSort(list) {
    let dragIdx = null;
    list.querySelectorAll('.file-list-item').forEach(item => {
      item.addEventListener('dragstart', () => { dragIdx = parseInt(item.dataset.idx); item.style.opacity = '0.5'; });
      item.addEventListener('dragend', () => { item.style.opacity = '1'; list.querySelectorAll('.file-list-item').forEach(el => el.classList.remove('drag-over')); });
      item.addEventListener('dragover', (e) => { e.preventDefault(); item.classList.add('drag-over'); });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', (e) => { e.preventDefault(); item.classList.remove('drag-over'); const dropIdx = parseInt(item.dataset.idx); if (dragIdx !== null && dragIdx !== dropIdx) { const [m] = fileEntries.splice(dragIdx, 1); fileEntries.splice(dropIdx, 0, m); renderFileList(); } });
    });
  }

  function updatePasswordUI() {
    const hasEnc = fileEntries.some(e => e.encrypted);
    const useSame = isSamePasswordMode();
    const gs = document.getElementById('globalPwdSection');
    const sr = document.getElementById('samePwdRow');
    if (gs) gs.style.display = (hasEnc && useSame && currentTool !== 'imagesToPdf') ? 'flex' : 'none';
    if (sr) sr.style.display = (hasEnc && fileEntries.length > 1 && multiFileTools.includes(currentTool)) ? 'flex' : 'none';
  }

  function isSamePasswordMode() { const c = document.getElementById('samePwdCheck'); return c ? c.checked : true; }
  function getPasswordForFile(idx) { return isSamePasswordMode() ? (document.getElementById('globalPassword')?.value || '') : (fileEntries[idx]?.password || ''); }
  function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function download(blob, name) { const u = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = u; a.download = name; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); }
  function parseRange(s, total) {
    const set = new Set();
    if (!s.trim()) return [...Array(total).keys()];
    s.split(',').forEach(p => { p = p.trim(); if (p.includes('-')) { const [a, b] = p.split('-').map(Number); for (let i = a; i <= b; i++) if (i >= 1 && i <= total) set.add(i - 1); } else { const n = Number(p); if (n >= 1 && n <= total) set.add(n - 1); } });
    return [...set].sort((a, b) => a - b);
  }

  function attachEvents() {
    const area = document.getElementById('fileArea');
    const input = document.getElementById('fileAreaInput');
    if (area && input) {
      area.onclick = () => input.click();
      area.ondragover = (e) => { e.preventDefault(); area.classList.add('dragover'); };
      area.ondragleave = () => area.classList.remove('dragover');
      area.ondrop = (e) => { e.preventDefault(); area.classList.remove('dragover'); const fs = Array.from(e.dataTransfer.files).filter(f => { if (currentTool === 'imagesToPdf') return f.type.startsWith('image/'); return f.type === 'application/pdf' || f.name.endsWith('.pdf'); }); if (fs.length) { if (!multiFileTools.includes(currentTool)) fileEntries = []; fileEntries.push(...fs.map(f => ({ file: f, password: '', status: undefined, encrypted: undefined }))); renderFileList(); } };
      input.onchange = () => { const fs = Array.from(input.files); if (!multiFileTools.includes(currentTool)) fileEntries = []; fileEntries.push(...fs.map(f => ({ file: f, password: '', status: undefined, encrypted: undefined }))); input.value = ''; renderFileList(); };
    }
    document.getElementById('clearBtn')?.addEventListener('click', () => { fileEntries = []; renderFileList(); });
    document.getElementById('samePwdCheck')?.addEventListener('change', renderFileList);
    document.querySelectorAll('.toggle-pwd').forEach(b => b.onclick = () => { const t = document.getElementById(b.dataset.target); if (t) { t.type = t.type === 'password' ? 'text' : 'password'; b.textContent = t.type === 'password' ? '👁️' : '🙈'; } });
    document.getElementById('splitMode')?.addEventListener('change', (e) => { const w = document.getElementById('rangeInputWrap'); if (w) w.style.display = e.target.value === 'range' ? 'block' : 'none'; });
    document.getElementById('actionBtn')?.addEventListener('click', () => executeAction(0));
  }

  async function executeAction(startIdx = 0) {
    if (!fileEntries.length) { setStatus('请先选择文件', 'warn'); return; }
    try {
      const actions = { merge: () => doMerge(startIdx), split: doSplit, removePassword: () => doRemovePassword(startIdx), compress: doCompress, extract: doExtract, extractPages: doExtractPages, pdfToImages: doPdfToImages, imagesToPdf: doImagesToPdf };
      await (actions[currentTool] || (() => {}))();
    } catch (err) { setStatus(`错误: ${err.message}`, 'warn'); }
  }

  async function doMerge(startIdx) {
    if (fileEntries.length < 2) { setStatus('至少需要2个PDF', 'warn'); return; }
    const allImages = [];
    for (let i = startIdx; i < fileEntries.length; i++) { setProgress((i / fileEntries.length) * 100, fileEntries[i].file.name); try { const { pageImages } = await processPdf(fileEntries[i].file, getPasswordForFile(i)); allImages.push(...pageImages); fileEntries[i].status = 'ok'; } catch (err) { handleError(err, i); return; } }
    setProgress(100, '生成PDF...');
    download(new Blob([await createPdfFromImages(allImages)], { type: 'application/pdf' }), 'merged.pdf');
    fileEntries.forEach(e => e.status = undefined);
    setStatus(`✅ 合并完成 (${allImages.length}页)`, 'success'); renderFileList();
  }

  async function doSplit() {
    const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0));
    const mode = document.getElementById('splitMode')?.value || 'pages';
    if (mode === 'pages') { for (let i = 0; i < pageImages.length; i++) { setProgress((i / pageImages.length) * 100); download(new Blob([await createPdfFromImages([pageImages[i]])], { type: 'application/pdf' }), `page_${i+1}.pdf`); } }
    else { const indices = parseRange(document.getElementById('rangeInput')?.value || '', pageImages.length); if (!indices.length) { setStatus('无效范围', 'warn'); return; } download(new Blob([await createPdfFromImages(indices.map(i => pageImages[i]))], { type: 'application/pdf' }), 'split.pdf'); }
    setStatus('✅ 拆分完成', 'success');
  }

  async function doRemovePassword(startIdx) {
    for (let i = startIdx; i < fileEntries.length; i++) { setProgress((i / fileEntries.length) * 100, fileEntries[i].file.name); try { const { pageImages } = await processPdf(fileEntries[i].file, getPasswordForFile(i)); download(new Blob([await createPdfFromImages(pageImages)], { type: 'application/pdf' }), fileEntries[i].file.name.replace(/\.pdf$/i, '') + '_no_password.pdf'); fileEntries[i].status = 'ok'; } catch (err) { handleError(err, i); return; } }
    fileEntries.forEach(e => e.status = undefined);
    setStatus('✅ 已导出无密码PDF', 'success'); renderFileList();
  }

  async function doCompress() { setProgress(0, '压缩中...'); const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0)); const bytes = await createPdfFromImages(pageImages); download(new Blob([bytes], { type: 'application/pdf' }), 'compressed.pdf'); setStatus(`✅ 压缩完成`, 'success'); }
  async function doExtract() { const images = await extractImages(fileEntries[0].file, getPasswordForFile(0)); if (!images.length) { setStatus('未找到图片', 'warn'); return; } if (images.length === 1) download(images[0].blob, 'image.png'); else if (typeof JSZip !== 'undefined') { const zip = new JSZip(); images.forEach(img => zip.file(`page${img.pageNum}_${img.index}.png`, img.blob)); download(await zip.generateAsync({ type: 'blob' }), 'images.zip'); } else images.forEach(img => download(img.blob, `page${img.pageNum}_${img.index}.png`)); setStatus(`✅ 提取完成 (${images.length}张)`, 'success'); }
  async function doExtractPages() { setProgress(0, '处理中...'); const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0)); const rangeStr = document.getElementById('extractRange')?.value || ''; const indices = parseRange(rangeStr, pageImages.length); if (!indices.length) { setStatus('请输入有效的页码范围', 'warn'); return; } const bytes = await createPdfFromImages(indices.map(i => pageImages[i])); download(new Blob([bytes], { type: 'application/pdf' }), `extracted_pages.pdf`); setStatus(`✅ 已提取 ${indices.length} 页`, 'success'); }

  async function doPdfToImages() {
    setProgress(0, '转换中...');
    const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0));
    const format = document.getElementById('outputFormat')?.value || 'jpeg';
    const useZip = document.getElementById('zipDownload')?.checked ?? false;
    if (pageImages.length === 1 && !useZip) { const blob = format === 'png' ? await jpegToPng(pageImages[0].blob) : pageImages[0].blob; download(blob, `page_1.${format}`); }
    else if (useZip && typeof JSZip !== 'undefined') { const zip = new JSZip(); for (let i = 0; i < pageImages.length; i++) { setProgress((i / pageImages.length) * 100); const blob = format === 'png' ? await jpegToPng(pageImages[i].blob) : pageImages[i].blob; zip.file(`page_${i+1}.${format}`, blob); } download(await zip.generateAsync({ type: 'blob' }), 'pdf_images.zip'); }
    else { for (let i = 0; i < pageImages.length; i++) { setProgress((i / pageImages.length) * 100); const blob = format === 'png' ? await jpegToPng(pageImages[i].blob) : pageImages[i].blob; download(blob, `page_${i+1}.${format}`); } }
    setStatus(`✅ 转换完成 (${pageImages.length}张)`, 'success');
  }

  async function jpegToPng(jpegBlob) { return new Promise(resolve => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height; canvas.getContext('2d').drawImage(img, 0, 0); canvas.toBlob(resolve, 'image/png'); }; img.src = URL.createObjectURL(jpegBlob); }); }

  async function doImagesToPdf() {
    if (fileEntries.length === 0) { setStatus('请选择图片', 'warn'); return; }
    setProgress(0, '处理中...');
    const pageSize = document.getElementById('pageSize')?.value || 'auto';
    const fitMode = document.getElementById('fitMode')?.value || 'fit';
    const pageDims = { a4: [595, 842], letter: [612, 792] };
    const { PDFDocument } = PDFLib;
    const doc = await PDFDocument.create();
    for (let i = 0; i < fileEntries.length; i++) { setProgress((i / fileEntries.length) * 100, fileEntries[i].file.name); const buf = await fileEntries[i].file.arrayBuffer(); const ext = fileEntries[i].file.name.split('.').pop().toLowerCase(); let img; if (ext === 'png') img = await doc.embedPng(buf); else if (ext === 'jpg' || ext === 'jpeg') img = await doc.embedJpg(buf); else { try { img = await doc.embedPng(buf); } catch (e) { img = await doc.embedJpg(buf); } }
      let pw, ph; if (pageSize === 'auto') { pw = img.width; ph = img.height; } else { [pw, ph] = pageDims[pageSize]; }
      const page = doc.addPage([pw, ph]); let dw = img.width, dh = img.height;
      if (fitMode === 'fit') { const s = Math.min(pw / img.width, ph / img.height); dw = img.width * s; dh = img.height * s; }
      else if (fitMode === 'fill') { const s = Math.max(pw / img.width, ph / img.height); dw = img.width * s; dh = img.height * s; }
      page.drawImage(img, { x: (pw - dw) / 2, y: (ph - dh) / 2, width: dw, height: dh }); fileEntries[i].status = 'ok'; }
    const bytes = await doc.save(); download(new Blob([bytes], { type: 'application/pdf' }), 'images_to_pdf.pdf');
    fileEntries.forEach(e => e.status = undefined); setStatus(`✅ 合成完成 (${fileEntries.length}张图片)`, 'success'); renderFileList();
  }

  renderToolUI();
})();
</script>
</body>
</html>
