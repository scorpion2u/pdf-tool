<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>多功能PDF工具</title>
  
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlBERuW3peWFt+ebkiIsCiAgInNob3J0X25hbWUiOiAiUERGIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZTBlMGUwIiwKICAidGhlbWVfY29sb3IiOiAiI2UwZTBlMCIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImljb24tMTkyLnBuZyIsCiAgICAgICJzaXplcyI6ICIxOTJ4MTkyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">
  
  <meta name="theme-color" content="#e0e0e0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PDF工具">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      --bg: #e0e0e0;
      --shadow-outer: 8px 8px 16px #bebebe, -8px -8px 16px #ffffff;
      --shadow-outer-sm: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff;
      --shadow-inner: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff;
      --shadow-inner-sm: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff;
      --shadow-convex: 6px 6px 12px #c8c8c8, -6px -6px 12px #ffffff;
      --shadow-pressed: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff;
      --text-primary: #333333;
      --text-secondary: #666666;
      --text-muted: #999999;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      max-width: 860px;
      width: 100%;
      background: var(--bg);
      border-radius: 2.5rem;
      box-shadow: 20px 20px 40px #bebebe, -20px -20px 40px #ffffff;
      padding: 2rem 1.8rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
    }

    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 1.2rem;
      font-weight: 600;
      font-size: 0.9rem;
      border-left: 4px solid #888;
      padding-left: 1rem;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .top-bar .subtitle {
      margin-bottom: 0;
    }

    .menu-container {
      position: relative;
      z-index: 1000;
    }

    .menu-button {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      border: none;
      background: var(--bg);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: var(--text-primary);
      box-shadow: var(--shadow-outer-sm);
    }
    .menu-button:active {
      box-shadow: var(--shadow-pressed);
      transform: scale(0.96);
    }

    .menu-dropdown {
      position: absolute;
      top: 52px;
      right: 0;
      background: var(--bg);
      border-radius: 20px;
      width: 220px;
      box-shadow: 12px 12px 24px #bebebe, -8px -8px 16px #ffffff;
      display: none;
      z-index: 1001;
      padding: 6px 0;
    }
    .menu-dropdown.show {
      display: block;
    }

    .menu-item {
      padding: 14px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      transition: all 0.15s;
      user-select: none;
      margin: 2px 8px;
      border-radius: 14px;
    }
    .menu-item:hover {
      box-shadow: var(--shadow-inner-sm);
    }
    .menu-item:active {
      box-shadow: var(--shadow-pressed);
      transform: scale(0.97);
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.9rem 0.5rem;
      border-radius: 1.4rem;
      border: none;
      background: var(--bg);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      text-align: center;
      box-shadow: var(--shadow-convex);
      font-family: inherit;
    }
    .tool-btn .tool-icon {
      font-size: 1.5rem;
      line-height: 1;
    }
    .tool-btn .tool-label {
      font-size: 0.75rem;
      line-height: 1;
    }
    .tool-btn:hover {
      box-shadow: 8px 8px 16px #bebebe, -6px -6px 12px #ffffff;
      transform: translateY(-1px);
    }
    .tool-btn:active {
      box-shadow: var(--shadow-pressed);
      transform: scale(0.95);
    }
    .tool-btn.active {
      background: #e0e0e0;
      color: #333333;
      box-shadow: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff;
      font-weight: 700;
    }

    .card {
      background: var(--bg);
      border-radius: 1.8rem;
      padding: 1.5rem;
      box-shadow: var(--shadow-outer);
      margin-bottom: 1rem;
    }

    .file-area {
      border: none;
      border-radius: 1.5rem;
      padding: 2rem 1rem;
      text-align: center;
      background: var(--bg);
      transition: all 0.2s;
      margin-bottom: 1rem;
      cursor: pointer;
      box-shadow: var(--shadow-inner);
    }
    .file-area:hover {
      box-shadow: inset 6px 6px 12px #bebebe, inset -6px -6px 12px #ffffff;
    }
    .file-area.dragover {
      box-shadow: inset 8px 8px 16px #bebebe, inset -8px -8px 16px #ffffff;
    }

    .file-input {
      display: none;
    }

    .file-icon {
      font-size: 2.2rem;
      margin-bottom: 0.4rem;
    }
    .file-label {
      font-weight: 700;
      color: var(--text-primary);
      font-size: 1rem;
    }
    .file-hint {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 0.3rem;
      font-weight: 600;
    }

    .file-list-item {
      display: flex;
      align-items: center;
      background: var(--bg);
      padding: 0.8rem 1rem;
      border-radius: 1.2rem;
      margin: 0.5rem 0;
      font-size: 0.85rem;
      gap: 0.5rem;
      min-width: 0;
      box-shadow: var(--shadow-outer-sm);
      transition: all 0.2s;
    }

    .drag-handle {
      cursor: grab;
      color: var(--text-muted);
      font-size: 1.2rem;
      padding: 0 0.2rem;
      user-select: none;
      flex-shrink: 0;
      font-weight: 700;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .file-idx {
      background: var(--bg);
      color: var(--text-primary);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: var(--shadow-inner-sm);
    }

    .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      color: var(--text-primary);
      font-weight: 600;
    }
    .file-size {
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 700;
      box-shadow: var(--shadow-outer-sm);
    }
    .badge-encrypted {
      background: #fef3c7;
      color: #92400e;
    }
    .badge-ok {
      background: #d1fae5;
      color: #065f46;
    }
    .badge-error {
      background: #fee2e2;
      color: #b91c1c;
    }
    .badge-plain {
      background: #e0e7ff;
      color: #3730a3;
    }

    .file-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .pwd-input {
      width: 100px;
      padding: 0.4rem 0.6rem;
      border-radius: 1.5rem;
      border: none;
      font-size: 0.75rem;
      background: #fffbeb;
      flex-shrink: 0;
      box-shadow: var(--shadow-inner-sm);
      color: #92400e;
      font-weight: 600;
    }
    .pwd-input.error {
      box-shadow: inset 2px 2px 5px #fecaca, inset -2px -2px 5px #ffffff;
      background: #fef2f2;
    }

    .btn-icon {
      background: var(--bg);
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.3rem 0.5rem;
      border-radius: 0.7rem;
      flex-shrink: 0;
      box-shadow: var(--shadow-outer-sm);
      color: var(--text-primary);
      font-weight: 700;
      transition: all 0.15s;
    }
    .btn-icon:active {
      box-shadow: var(--shadow-pressed);
      transform: scale(0.93);
    }

    .btn-retry {
      background: var(--bg);
      border: none;
      color: #b91c1c;
      padding: 0.25rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      cursor: pointer;
      flex-shrink: 0;
      font-weight: 700;
      box-shadow: var(--shadow-outer-sm);
    }
    .btn-retry:active {
      box-shadow: var(--shadow-pressed);
      transform: scale(0.93);
    }

    .btn-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .btn-primary {
      background: #e0e0e0;
      border: none;
      color: #333333;
      padding: 0.7rem 1.6rem;
      border-radius: 2rem;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
      box-shadow: 6px 6px 14px #bebebe, -4px -4px 10px #ffffff;
      font-family: inherit;
    }
    .btn-primary:hover {
      box-shadow: 8px 8px 18px #bebebe, -6px -6px 12px #ffffff;
      transform: translateY(-1px);
    }
    .btn-primary:active {
      box-shadow: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff;
      transform: scale(0.96);
      background: #e0e0e0;
    }
    .btn-primary:disabled {
      background: #e0e0e0;
      color: #999;
      cursor: not-allowed;
      box-shadow: inset 2px 2px 4px #bebebe, inset -2px -2px 4px #ffffff;
    }

    .btn-danger {
      background: #e0e0e0;
      color: #c0392b;
    }
    .btn-danger:hover {
      box-shadow: 8px 8px 18px #bebebe, -6px -6px 12px #ffffff;
    }
    .btn-danger:active {
      box-shadow: var(--shadow-pressed);
      transform: scale(0.96);
      background: #e0e0e0;
    }

    .btn-secondary {
      background: var(--bg);
      border: none;
      color: var(--text-primary);
      padding: 0.7rem 1.4rem;
      border-radius: 2rem;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      box-shadow: var(--shadow-convex);
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-secondary:hover {
      box-shadow: 8px 8px 16px #bebebe, -6px -6px 12px #ffffff;
    }
    .btn-secondary:active {
      box-shadow: var(--shadow-pressed);
      transform: scale(0.96);
    }

    .password-section {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
      background: #fef3c7;
      padding: 0.8rem 1rem;
      border-radius: 1.2rem;
      box-shadow: var(--shadow-inner-sm);
    }

    .password-input {
      padding: 0.5rem 0.9rem;
      border-radius: 2rem;
      border: none;
      flex: 1;
      min-width: 120px;
      background: #fff;
      box-shadow: var(--shadow-inner-sm);
      font-weight: 600;
      font-family: inherit;
    }

    .toggle-pwd {
      background: var(--bg);
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: #555;
      font-weight: 700;
      padding: 0.4rem 0.8rem;
      border-radius: 1.5rem;
      box-shadow: var(--shadow-outer-sm);
    }
    .toggle-pwd:active {
      box-shadow: var(--shadow-pressed);
      transform: scale(0.93);
    }

    .info-box {
      background: #ecf0f1;
      border: none;
      border-radius: 1.2rem;
      padding: 0.8rem 1rem;
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: #2c3e50;
      line-height: 1.5;
      box-shadow: var(--shadow-inner-sm);
      font-weight: 600;
    }

    .highlight-box {
      background: #fefce8;
      border: none;
      border-radius: 1.2rem;
      padding: 0.9rem;
      margin-top: 0.8rem;
      font-size: 0.85rem;
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
      box-shadow: var(--shadow-convex);
      font-weight: 600;
      color: #5d4e37;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      margin-top: 0.8rem;
      overflow: hidden;
      box-shadow: var(--shadow-inner-sm);
    }
    .progress-bar-fill {
      height: 100%;
      background: #666;
      border-radius: 5px;
      transition: width 0.3s;
      width: 0%;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .status {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      display: inline-block;
      font-weight: 700;
      box-shadow: var(--shadow-outer-sm);
    }
    .status-info {
      color: #2c3e50;
      background: #ecf0f1;
    }
    .status-warn {
      color: #7d6608;
      background: #fef3c7;
    }
    .status-success {
      color: #0b5345;
      background: #d1fae5;
    }
    .status-error {
      color: #922b21;
      background: #fee2e2;
    }

    .same-pwd-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .quality-selector {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.8rem;
      flex-wrap: wrap;
      background: var(--bg);
      padding: 0.7rem 1rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      box-shadow: var(--shadow-inner);
      font-weight: 600;
      color: var(--text-primary);
    }

    .output-format-row {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .output-format-row label {
      font-weight: 700;
      font-size: 0.85rem;
    }

    .watermark-settings {
      margin-top: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .watermark-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .watermark-row label {
      font-weight: 700;
      font-size: 0.85rem;
      white-space: nowrap;
      min-width: 60px;
      color: var(--text-primary);
    }
    .watermark-row input[type="text"],
    .watermark-row input[type="range"] {
      flex: 1;
      min-width: 100px;
    }

    /* ======== 自定义下拉 ======== */
    .custom-select-wrapper {
      position: relative;
      display: inline-block;
    }
    .custom-select-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      background: #e0e0e0;
      box-shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      font-size: 0.85rem;
      min-width: 100px;
      user-select: none;
      transition: all 0.2s;
    }
    .custom-select-display:hover {
      box-shadow: 6px 6px 12px #bebebe, -6px -6px 12px #ffffff;
    }
    .custom-select-display.open {
      box-shadow: inset 3px 3px 6px #bebebe, inset -3px -3px 6px #ffffff !important;
    }
    .custom-select-display .arrow {
      font-size: 0.7rem;
      color: #999;
      transition: transform 0.2s;
    }
    .custom-select-display.open .arrow {
      transform: rotate(180deg);
    }
    .custom-select-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #e8e8e8;
      border-radius: 1rem;
      box-shadow: 8px 8px 16px #bebebe, -4px -4px 8px #ffffff;
      z-index: 100;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .custom-select-dropdown.open {
      display: block;
    }
    .custom-select-option {
      padding: 0.65rem 1rem;
      cursor: pointer;
      font-weight: 600;
      color: #333;
      font-size: 0.85rem;
      margin: 3px 8px;
      border-radius: 0.8rem;
      transition: all 0.15s;
    }
    .custom-select-option:hover {
      box-shadow: inset 2px 2px 5px #d0d0d0, inset -2px -2px 5px #f0f0f0;
      background: #e8e8e8;
    }
    .custom-select-option.selected {
      background: #e0e0e0 !important;
      color: #333 !important;
      box-shadow: inset 3px 3px 6px #bebebe, inset -3px -3px 6px #ffffff !important;
      font-weight: 700;
      position: relative;
    }
    .custom-select-option.selected::after {
      content: '✓';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      color: #666;
      font-weight: 700;
    }

    select.native-select {
      display: none !important;
    }

    @media (max-width: 600px) {
      .container {
        padding: 1.2rem 0.8rem;
        border-radius: 2rem;
      }
      .tools-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 0.5rem;
      }
      .tool-btn {
        padding: 0.7rem 0.3rem;
        border-radius: 1.2rem;
      }
      .tool-btn .tool-icon {
        font-size: 1.3rem;
      }
      .tool-btn .tool-label {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>📄 PDF工具箱</h1>
      <div class="menu-container" id="menuContainer">
        <button class="menu-button" id="menuButton" aria-label="菜单">☰</button>
        <div class="menu-dropdown" id="menuDropdown">
          <div class="menu-item" id="installAppBtn">📱 安装应用</div>
          <div class="menu-item" id="languageMenuItem">🌐 语言 / Language</div>
        </div>
      </div>
    </div>
    <div class="subtitle">多功能PDF处理工具</div>

    <div class="tools-grid" id="toolsGrid">
      <button class="tool-btn active" data-tool="removePassword"><span class="tool-icon">🔓</span><span class="tool-label">删除密码</span></button>
      <button class="tool-btn" data-tool="split"><span class="tool-icon">✂️</span><span class="tool-label">拆分PDF</span></button>
      <button class="tool-btn" data-tool="merge"><span class="tool-icon">🔗</span><span class="tool-label">合并PDF</span></button>
      <button class="tool-btn" data-tool="compress"><span class="tool-icon">📦</span><span class="tool-label">压缩PDF</span></button>
      <button class="tool-btn" data-tool="watermark"><span class="tool-icon">💧</span><span class="tool-label">添加水印</span></button>
      <button class="tool-btn" data-tool="extractPages"><span class="tool-icon">📑</span><span class="tool-label">提取页面</span></button>
      <button class="tool-btn" data-tool="pdfToImages"><span class="tool-icon">🔄</span><span class="tool-label">PDF转图片</span></button>
      <button class="tool-btn" data-tool="imagesToPdf"><span class="tool-icon">📸</span><span class="tool-label">图片转PDF</span></button>
    </div>

    <div class="card" id="toolCard"></div>
    <div id="statusArea" style="text-align: center;"></div>
  </div>

      function detectBrowserLanguage() {
        const lang = (navigator.language || navigator.userLanguage || 'zh-CN').toLowerCase();
        if (lang.startsWith('zh')) return 'zh-CN';
        return 'en-US';
      }

      let currentLang = detectBrowserLanguage();
      try { const saved = localStorage.getItem('pdf-tool-lang'); if (saved && LANGUAGES[saved]) currentLang = saved; } catch (e) {}

      function t(key) { return LANGUAGES[currentLang]?.[key] || LANGUAGES['zh-CN'][key] || key; }

      function updateAllTexts() {
        document.querySelector('h1').textContent = t('menuTitle');
        document.querySelector('.subtitle').textContent = t('subtitle');
        const labels = ['removePassword', 'split', 'merge', 'compress', 'watermark', 'extractPages', 'pdfToImages', 'imagesToPdf'];
        document.querySelectorAll('.tool-btn .tool-label').forEach((el, i) => { if (i < labels.length) el.textContent = t(labels[i]); });
        updateMenuLanguage();
        renderToolUI();
      }

      function updateMenuLanguage() {
        const ib = document.getElementById('installAppBtn');
        if (ib) ib.textContent = isRunningAsPWA() ? t('installedApp') : (window._deferredPrompt ? t('installApp') : t('addToHome'));
        const lb = document.getElementById('languageMenuItem');
        if (lb) lb.textContent = t('language');
      }

      function isRunningAsPWA() { return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; }

      function detectBrowser() {
        const ua = navigator.userAgent;
        if (/Edg/.test(ua)) return 'edge';
        if (/Chrome/.test(ua) && /Google Inc/.test(navigator.vendor)) return 'chrome';
        if (/Safari/.test(ua) && !/Chrome/.test(ua)) return 'safari';
        if (/iPhone|iPad|iPod/.test(ua)) return 'ios';
        return 'other';
      }

      function showModal(title, html) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:10000;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = `<div style="background:#e0e0e0;border-radius:24px;padding:24px;max-width:380px;width:90%;box-shadow:20px 20px 40px #bebebe,-20px -20px 40px #ffffff;"><h3 style="margin-bottom:12px;color:#333;">${title}</h3>${html}<button id="modalCloseBtn" style="margin-top:12px;width:100%;padding:12px;border:none;border-radius:20px;background:#e0e0e0;color:#333;cursor:pointer;font-size:0.9rem;font-weight:700;box-shadow:4px 4px 8px #bebebe,-4px -4px 8px #ffffff;">${t('gotIt')}</button></div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('#modalCloseBtn').onclick = () => overlay.remove();
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      }

      function installPWA() {
        if (isRunningAsPWA()) {
          showModal(t('installTitle'), `<div style="text-align:center;padding:12px;"><div style="font-size:40px;">📱</div><p style="color:#333;font-weight:600;">${t('usingInstalled')}</p><p style="font-size:0.8rem;color:#666;">${t('runningStandalone')}</p></div>`);
          return;
        }
        if (!window._deferredPrompt) {
          const b = detectBrowser();
          let h = '';
          if (b === 'chrome' || b === 'edge') h = `<p style="font-weight:600;color:#333;">${t('chromeSteps')}</p><p style="color:#555;">1. ${t('step1chrome')}</p><p style="color:#555;">2. ${t('step2chrome')}</p>`;
          else if (b === 'ios' || b === 'safari') h = `<p style="font-weight:600;color:#333;">${t('iosSteps')}</p><p style="color:#555;">1. ${t('step1ios')}</p><p style="color:#555;">2. ${t('step2ios')}</p>`;
          else h = `<p style="color:#333;">${t('browserNotSupport')}</p><p style="font-size:0.8rem;color:#666;">${t('suggestBrowser')}</p>`;
          showModal(t('installTitle'), h);
          return;
        }
        window._deferredPrompt.prompt();
        window._deferredPrompt = null;
        updateMenuLanguage();
      }

      function showLanguageSelector() {
        const html = `<div style="margin-bottom:12px;padding:10px;border-radius:14px;text-align:center;box-shadow:inset 3px 3px 6px #bebebe,inset -3px -3px 6px #ffffff;"><div style="font-size:0.8rem;color:#666;">${t('currentLanguage')}</div><div style="font-size:1.2rem;font-weight:700;color:#333;">${currentLang==='zh-CN'?'简体中文':'English'}</div></div><div style="display:flex;flex-direction:column;gap:8px;"><div class="lopt" data-l="zh-CN" style="padding:14px;border-radius:14px;cursor:pointer;font-weight:600;color:#333;box-shadow:${currentLang==='zh-CN'?'inset 4px 4px 8px #bebebe,inset -4px -4px 8px #ffffff':'4px 4px 8px #bebebe,-4px -4px 8px #ffffff'};transition:0.2s;">🇨🇳 ${t('simplifiedChinese')} ${currentLang==='zh-CN'?'✓':''}</div><div class="lopt" data-l="en-US" style="padding:14px;border-radius:14px;cursor:pointer;font-weight:600;color:#333;box-shadow:${currentLang==='en-US'?'inset 4px 4px 8px #bebebe,inset -4px -4px 8px #ffffff':'4px 4px 8px #bebebe,-4px -4px 8px #ffffff'};transition:0.2s;">🇺🇸 ${t('english')} ${currentLang==='en-US'?'✓':''}</div></div>`;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:10000;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = `<div style="background:#e0e0e0;border-radius:24px;padding:24px;max-width:380px;width:90%;box-shadow:20px 20px 40px #bebebe,-20px -20px 40px #ffffff;"><h3 style="margin-bottom:12px;color:#333;">${t('selectLanguage')}</h3>${html}<button id="lclose" style="margin-top:12px;width:100%;padding:12px;border:none;border-radius:20px;background:#e0e0e0;color:#333;cursor:pointer;font-weight:700;box-shadow:4px 4px 8px #bebebe,-4px -4px 8px #ffffff;">${t('close')}</button></div>`;
        document.body.appendChild(overlay);
        overlay.querySelectorAll('.lopt').forEach(o => o.onclick = () => {
          const nl = o.dataset.l;
          if (nl !== currentLang) {
            currentLang = nl;
            try { localStorage.setItem('pdf-tool-lang', nl); } catch (e) {}
            updateAllTexts();
          }
          overlay.remove();
        });
        overlay.querySelector('#lclose').onclick = () => overlay.remove();
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      }

      let currentTool = 'removePassword';
      let fileEntries = [];
      let isProcessing = false;
      const MAX_FILE_SIZE = 100 * 1024 * 1024;
      const toolCard = document.getElementById('toolCard');
      const statusArea = document.getElementById('statusArea');
      const toolsGrid = document.getElementById('toolsGrid');
      const multiFileTools = ['merge', 'removePassword', 'imagesToPdf'];

      toolsGrid.addEventListener('click', (e) => {
        const btn = e.target.closest('.tool-btn');
        if (!btn || isProcessing) return;
        toolsGrid.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTool = btn.dataset.tool;
        fileEntries = [];
        clearStatus();
        renderToolUI();
      });

      function clearStatus() { statusArea.innerHTML = ''; }

      function setStatus(text, type = 'info') {
        const cls = type === 'warn' ? 'status-warn' : type === 'success' ? 'status-success' : type === 'error' ? 'status-error' : 'status-info';
        statusArea.innerHTML = `<div class="status ${cls}">${text}</div>`;
      }

      function setProgress(pct, text = '') {
        statusArea.innerHTML = `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div style="text-align:center;font-size:0.75rem;color:#666;font-weight:600;margin-top:4px;">${text || Math.round(pct) + '%'}</div>`;
      }

      function getRenderOptions() {
        if (currentTool === 'compress') return { scale: parseFloat(document.getElementById('renderScale')?.value || '1.0'), quality: parseFloat(document.getElementById('jpegQuality')?.value || '0.6') };
        if (currentTool === 'pdfToImages') return { scale: parseFloat(document.getElementById('renderScale')?.value || '2.0'), quality: parseFloat(document.getElementById('jpegQuality')?.value || '0.92') };
        return { scale: 2.0, quality: 0.92 };
      }

      function validateFile(file) {
        if (!file) return false;
        if (file.size === 0) { setStatus('文件为空', 'error'); return false; }
        if (file.size > MAX_FILE_SIZE) { setStatus(t('fileTooLarge'), 'error'); return false; }
        return true;
      }

      async function renderPdfToImages(file, password = '', options = {}) {
        const { scale = 2.0, quality = 0.92 } = options;
        const arrayBuf = await file.arrayBuffer();
        const loadingTask = pdfjsLib.getDocument({ data: arrayBuf, password: password || undefined });
        return new Promise((resolve, reject) => {
          loadingTask.onPassword = (_, reason) => {
            if (reason === 1) reject(new Error('NEED_PASSWORD'));
            else if (reason === 2) reject(new Error('INCORRECT_PASSWORD'));
          };
          loadingTask.promise.then(async (pdf) => {
            const pages = [];
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const vp = page.getViewport({ scale });
              const canvas = document.createElement('canvas');
              canvas.width = vp.width;
              canvas.height = vp.height;
              await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
              const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
              pages.push({ width: vp.width, height: vp.height, data: await blob.arrayBuffer(), blob });
            }
            resolve(pages);
          }).catch(err => {
            if (err.name === 'PasswordException') reject(new Error('INCORRECT_PASSWORD'));
            else reject(err);
          });
        });
      }

      async function createPdfFromImages(pageImages) {
        const { PDFDocument } = PDFLib;
        const doc = await PDFDocument.create();
        for (const img of pageImages) {
          let jpg;
          if (img.data instanceof ArrayBuffer) jpg = await doc.embedJpg(img.data);
          else if (img.blob) jpg = await doc.embedJpg(await img.blob.arrayBuffer());
          const page = doc.addPage([img.width, img.height]);
          page.drawImage(jpg, { x: 0, y: 0, width: img.width, height: img.height });
        }
        return await doc.save();
      }

      async function checkEncrypted(file) {
        try { await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise; return false; }
        catch (e) { return !!(e.name === 'PasswordException' || (e.message && e.message.includes('password'))); }
      }

      async function processPdf(file, password = '') {
        const needsPwd = await checkEncrypted(file);
        if (needsPwd && !password) throw new Error('NEED_PASSWORD');
        return { pageImages: await renderPdfToImages(file, password, getRenderOptions()), isEncrypted: needsPwd };
      }

      function handleError(err, idx) {
        const entry = fileEntries[idx];
        if (!entry) return;
        if (err.message === 'NEED_PASSWORD') { entry.status = 'error'; setStatus(`⚠️ ${t('needPassword')}`, 'warn'); }
        else if (err.message === 'INCORRECT_PASSWORD') { entry.status = 'error'; setStatus(`❌ ${t('wrongPassword')}`, 'warn'); }
        else { setStatus(`❌ ${err.message}`, 'error'); }
        renderFileList();
      }

      function renderToolUI() {
        clearStatus();
        if (isProcessing) { setStatus(t('processing'), 'info'); return; }
        const builders = {
          merge: buildMergeUI, split: buildSplitUI, removePassword: buildRemovePwdUI,
          compress: buildCompressUI, watermark: buildWatermarkUI, extractPages: buildExtractPagesUI,
          pdfToImages: buildPdfToImagesUI, imagesToPdf: buildImagesToPdfUI
        };
        toolCard.innerHTML = (builders[currentTool] || (() => ''))();
        attachEvents();
        renderFileList();
        setTimeout(() => { initCustomSelects(); enhanceFileDropAreas(); }, 50);
      }

      function fileDropArea(multiple, title, accept = '.pdf') {
        const iconMap = { merge: '📎', split: '✂️', removePassword: '🔓', compress: '📦', watermark: '💧', extractPages: '📑', pdfToImages: '🔄', imagesToPdf: '📸' };
        return `<div class="file-area" id="fileArea"><div class="file-icon">${iconMap[currentTool]||'📂'}</div><div class="file-label">${title}</div><div class="file-hint">${multiple ? t('supportMulti') : t('supportSingle')} (${accept})</div><input type="file" id="fileAreaInput" class="file-input" accept="${accept}" ${multiple ? 'multiple' : ''}></div><div id="fileAreaList" class="file-list"></div>`;
      }

      function buildMergeUI() {
        return `${fileDropArea(true, t('selectPdfMerge'))}<div class="same-pwd-row" id="samePwdRow" style="display:none;"><input type="checkbox" id="samePwdCheck" checked><label for="samePwdCheck">${t('samePassword')}</label></div><div id="globalPwdSection" class="password-section" style="display:none;"><span>${t('passwordLabel')}</span><input type="password" id="globalPassword" class="password-input" placeholder="${t('passwordPlaceholder')}"><button class="toggle-pwd" data-target="globalPassword">${t('show')}</button></div><div class="btn-group"><button class="btn-primary" id="actionBtn">${t('startMerge')}</button><button class="btn-secondary" id="clearBtn">${t('clearList')}</button></div>`;
      }

      function buildSplitUI() {
        return `${fileDropArea(false, t('selectPdfSplit'))}<div id="globalPwdSection" class="password-section" style="display:none;"><span>${t('passwordSingle')}</span><input type="password" id="globalPassword" class="password-input" placeholder="${t('passwordPlaceholder')}"><button class="toggle-pwd" data-target="globalPassword">${t('show')}</button></div><div style="margin-top:0.8rem;display:flex;gap:0.6rem;align-items:center;font-weight:600;color:#333;"><label>${t('splitMode')}</label><select id="splitMode"><option value="pages">${t('byPage')}</option><option value="range">${t('byRange')}</option></select></div><div id="rangeInputWrap" style="margin-top:0.6rem;display:none;"><input type="text" id="rangeInput" placeholder="${t('rangePlaceholder')}" style="width:100%;padding:0.6rem;border-radius:2rem;border:none;background:#e0e0e0;box-shadow:inset 3px 3px 6px #bebebe,inset -3px -3px 6px #ffffff;font-weight:600;font-family:inherit;"></div><div class="btn-group"><button class="btn-primary" id="actionBtn">${t('startSplit')}</button></div>`;

      function download(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = name; a.style.display = 'none';
        document.body.appendChild(a); a.click();

      function parseRange(s, total) {
        const set = new Set();
        if (!s.trim()) return [...Array(total).keys()];
        s.split(',').forEach(p => {
          p = p.trim();
          if (p.includes('-')) { const [a, b] = p.split('-').map(Number); for (let i = a; i <= b; i++) if (i >= 1 && i <= total) set.add(i - 1); }
          else { const n = Number(p); if (n >= 1 && n <= total) set.add(n - 1); }
        });
        return [...set].sort((a, b) => a - b);
      }

      async function executeAction(startIdx = 0) {
        if (isProcessing) return;
        if (!fileEntries.length) { setStatus(t('noFile'), 'warn'); return; }
        isProcessing = true; setButtonsDisabled(true);
        try {
          const actions = { merge: () => doMerge(startIdx), split: doSplit, removePassword: () => doRemovePassword(startIdx), compress: doCompress, watermark: doWatermark, extractPages: doExtractPages, pdfToImages: doPdfToImages, imagesToPdf: doImagesToPdf };
          await (actions[currentTool] || (() => {}))();
        } catch (err) { setStatus(`❌ ${err.message}`, 'error'); }
        finally { isProcessing = false; setButtonsDisabled(false); }
      }

      async function doMerge(startIdx) {
        if (fileEntries.length < 2) { setStatus(t('atLeast2'), 'warn'); return; }
        const allImages = [];
        for (let i = startIdx; i < fileEntries.length; i++) {
          setProgress((i / fileEntries.length) * 100, `${t('processing')} ${fileEntries[i].file.name}`);
          try { const { pageImages } = await processPdf(fileEntries[i].file, getPasswordForFile(i)); allImages.push(...pageImages); fileEntries[i].status = 'ok'; }
          catch (err) { handleError(err, i); return; }
        }
        setProgress(100, t('generating'));
        download(new Blob([await createPdfFromImages(allImages)], { type: 'application/pdf' }), 'merged.pdf');
        fileEntries.forEach(e => e.status = undefined);
        setStatus(`✅ ${t('mergeSuccess')} (${allImages.length}${t('pages')})`, 'success');
        renderFileList();
      }

      async function doSplit() {
    setProgress(10, t('processing'));

        for (let i = 0; i < pageImages.length; i++) {
            setProgress(30 + ((i / pageImages.length) * 60), `生成第 ${i+1}/${pageImages.length} 页...`);

    setStatus(`✅ ${t('splitSuccess')} (${pageImages.length}${t('pages')})`, 'success');
}

      function renderTextToImage(text, options = {}) {
        const { fontSize = 40, angle = -45, opacity = 0.1, color = '#666666' } = options;
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        ctx.font = `bold ${fontSize}px Arial, "Microsoft YaHei", "SimHei", "Noto Sans SC", sans-serif`;
        const textMetrics = ctx.measureText(text); const textWidth = textMetrics.width; const textHeight = fontSize * 1.2;
        const angleRad = (angle * Math.PI) / 180; const cosA = Math.abs(Math.cos(angleRad)); const sinA = Math.abs(Math.sin(angleRad));
        const rotatedWidth = textWidth * cosA + textHeight * sinA; const rotatedHeight = textWidth * sinA + textHeight * cosA;
        const padding = Math.max(fontSize, 20);
        canvas.width = Math.ceil(rotatedWidth + padding * 2); canvas.height = Math.ceil(rotatedHeight + padding * 2);
        ctx.font = `bold ${fontSize}px Arial, "Microsoft YaHei", "SimHei", "Noto Sans SC", sans-serif`;
        ctx.fillStyle = color; ctx.globalAlpha = opacity; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.translate(canvas.width / 2, canvas.height / 2); ctx.rotate(angleRad); ctx.fillText(text, 0, 0);
        return new Promise(resolve => { canvas.toBlob(resolve, 'image/png'); });
      }

      async function doWatermark() {
        setProgress(0, t('processing'));
        const { PDFDocument } = PDFLib;
        const text = document.getElementById('watermarkText')?.value || '';
        if (!text.trim()) { setStatus('❌ 请输入水印文字', 'warn'); return; }
        const position = document.getElementById('watermarkPosition')?.value || 'full';
        const angleVal = parseFloat(document.getElementById('watermarkAngle')?.value || '45');
        const opacityVal = parseFloat(document.getElementById('watermarkOpacity')?.value || '0.1');
        const fontSize = parseInt(document.getElementById('watermarkSize')?.value || '40');
        const arrayBuf = await fileEntries[0].file.arrayBuffer();
        const needsPwd = await checkEncrypted(fileEntries[0].file);
        let pdfDoc;
        if (needsPwd) { const password = getPasswordForFile(0); if (!password) { setStatus(t('needPassword'), 'warn'); return; } pdfDoc = await PDFDocument.load(arrayBuf, { password }); }
        else { pdfDoc = await PDFDocument.load(arrayBuf); }
        setProgress(20, '生成水印...');
        const watermarkBlob = await renderTextToImage(text, { fontSize, angle: -angleVal, opacity: opacityVal });
        const watermarkBytes = await watermarkBlob.arrayBuffer();
        const watermarkImage = await pdfDoc.embedPng(watermarkBytes);
        setProgress(40, '添加水印...');
        const pages = pdfDoc.getPages(); const totalPages = pages.length;
        for (let i = 0; i < totalPages; i++) {
          const page = pages[i]; setProgress(40 + (i / totalPages) * 40);
          const { width, height } = page.getSize(); const maxWidth = width * 0.3;
          const scale = Math.min(1, maxWidth / watermarkImage.width);
          const imgWidth = watermarkImage.width * scale; const imgHeight = watermarkImage.height * scale;
          if (position === 'full') {
            const xSpacing = imgWidth * 1.2; const ySpacing = imgHeight * 1.5; let rowOffset = 0;
            for (let y = -imgHeight/2; y < height + imgHeight; y += ySpacing) {
              rowOffset = (rowOffset + xSpacing * 0.5) % xSpacing;
              for (let x = -imgWidth/2 + rowOffset; x < width + imgWidth; x += xSpacing) {
                page.drawImage(watermarkImage, { x, y, width: imgWidth, height: imgHeight, opacity: 1 });
              }
            }
          } else {
            let x = (width - imgWidth) / 2; let y = (height - imgHeight) / 2;
            if (position === 'top') y = height - imgHeight - 30;
            else if (position === 'bottom') y = 30;
            page.drawImage(watermarkImage, { x, y, width: imgWidth, height: imgHeight, opacity: 1 });
          }
        }
        setProgress(85, t('generating'));
        const pdfBytes = await pdfDoc.save(); setProgress(100);
        const originalName = fileEntries[0].file.name.replace(/\.pdf$/i, '');
        download(new Blob([pdfBytes], { type: 'application/pdf' }), `${originalName}_watermarked.pdf`);
        setStatus(`✅ ${t('watermarkSuccess')}`, 'success');
      }

      async function doExtractPages() {
        setProgress(0, t('processing'));
        const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        const rangeStr = document.getElementById('extractRange')?.value || '';
        const indices = parseRange(rangeStr, pageImages.length);
        if (!indices.length) { setStatus(t('pleaseEnterRange'), 'warn'); return; }
        const bytes = await createPdfFromImages(indices.map(i => pageImages[i]));
        download(new Blob([bytes], { type: 'application/pdf' }), 'extracted_pages.pdf');
        setStatus(`✅ ${t('extractSuccess')} (${indices.length}${t('pages')})`, 'success');
      }

      async function doPdfToImages() {
        setProgress(0, t('processing'));
        const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        const format = document.getElementById('outputFormat')?.value || 'jpeg';
        const useZip = document.getElementById('zipDownload')?.checked ?? false;
        if (pageImages.length === 1 && !useZip) { const blob = format === 'png' ? await jpegToPng(pageImages[0].blob) : pageImages[0].blob; download(blob, `page_1.${format}`); }
        else if (useZip && typeof JSZip !== 'undefined') { const zip = new JSZip(); for (let i = 0; i < pageImages.length; i++) { setProgress((i / pageImages.length) * 100); const blob = format === 'png' ? await jpegToPng(pageImages[i].blob) : pageImages[i].blob; zip.file(`page_${i+1}.${format}`, blob); } download(await zip.generateAsync({ type: 'blob' }), 'pdf_images.zip'); }
        else { for (let i = 0; i < pageImages.length; i++) { setProgress((i / pageImages.length) * 100); const blob = format === 'png' ? await jpegToPng(pageImages[i].blob) : pageImages[i].blob; download(blob, `page_${i+1}.${format}`); } }
        setStatus(`✅ ${t('convertSuccess')} (${pageImages.length})`, 'success');
      }

      async function jpegToPng(jpegBlob) {
        return new Promise(resolve => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height; canvas.getContext('2d').drawImage(img, 0, 0); canvas.toBlob(resolve, 'image/png'); }; img.src = URL.createObjectURL(jpegBlob); });
      }

      async function doImagesToPdf() {
        if (fileEntries.length === 0) { setStatus(t('noFile'), 'warn'); return; }
        setProgress(0, t('processing'));
        const pageSize = document.getElementById('pageSize')?.value || 'auto';
        const fitMode = document.getElementById('fitMode')?.value || 'fit';
        const pageDims = { a4: [595, 842], letter: [612, 792] };
        const { PDFDocument } = PDFLib; const doc = await PDFDocument.create();
        for (let i = 0; i < fileEntries.length; i++) {
          setProgress((i / fileEntries.length) * 100, `${t('processing')} ${fileEntries[i].file.name}`);
          const buf = await fileEntries[i].file.arrayBuffer();
          const ext = fileEntries[i].file.name.split('.').pop().toLowerCase();
          let img;
          if (ext === 'png') img = await doc.embedPng(buf);
          else if (ext === 'jpg' || ext === 'jpeg') img = await doc.embedJpg(buf);
          else { try { img = await doc.embedPng(buf); } catch (e) { img = await doc.embedJpg(buf); } }
          let pw, ph;
          if (pageSize === 'auto') { pw = img.width; ph = img.height; } else { [pw, ph] = pageDims[pageSize]; }
          const page = doc.addPage([pw, ph]);
          let dw = img.width, dh = img.height;
          if (fitMode === 'fit') { const s = Math.min(pw / img.width, ph / img.height); dw = img.width * s; dh = img.height * s; }
          else if (fitMode === 'fill') { const s = Math.max(pw / img.width, ph / img.height); dw = img.width * s; dh = img.height * s; }
          page.drawImage(img, { x: (pw - dw) / 2, y: (ph - dh) / 2, width: dw, height: dh });
          fileEntries[i].status = 'ok';
        }
        const bytes = await doc.save();
        download(new Blob([bytes], { type: 'application/pdf' }), 'images_to_pdf.pdf');
        fileEntries.forEach(e => e.status = undefined);
        setStatus(`✅ ${t('composeSuccess')} (${fileEntries.length})`, 'success');
        renderFileList();
      }

      document.getElementById('menuButton').addEventListener('click', function(e) { e.stopPropagation(); var dd = document.getElementById('menuDropdown'); if (dd.classList.contains('show')) { dd.classList.remove('show'); } else { dd.classList.add('show'); } });
      document.addEventListener('click', function(e) { if (!e.target.closest('#menuContainer')) { var dd = document.getElementById('menuDropdown'); if (dd) dd.classList.remove('show'); } });
      document.getElementById('installAppBtn').addEventListener('click', function() { document.getElementById('menuDropdown').classList.remove('show'); installPWA(); });
      document.getElementById('languageMenuItem').addEventListener('click', function() { document.getElementById('menuDropdown').classList.remove('show'); showLanguageSelector(); });
      window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault(); window._deferredPrompt = e; updateMenuLanguage(); });

      setTimeout(() => { initCustomSelects(); enhanceFileDropAreas(); }, 200);
      updateAllTexts();
    })();
  </script>
</body>
